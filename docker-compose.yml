services:
  main-backend:
    container_name: main-backend
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    depends_on:
      main-db:
        condition: service_healthy  # DB가 실제로 쿼리 받을 준비가 됐을 때만 시작
      redis:
        condition: service_started
    restart: always
    cap_drop:
      - ALL
    environment:
      - DB_HOST=main-db
      - DB_PORT=5432
      - DB_USER=${MAIN_DB_USER}
      - DB_PASSWORD=${MAIN_DB_PASSWORD}
      - DB_NAME=${MAIN_DB_NAME}
      - REDIS_URL=redis://redis:6379
      # - CHROMA_HOST=chromadb
      # - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-300}
      - CHROMA_PATH=/app/chroma_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}

  main-db:
    container_name: main-db
    image: postgres:16.2-alpine
    volumes:
      - main-db-data:/var/lib/postgresql/data
    restart: always
    environment:
      - POSTGRES_USER=${MAIN_DB_USER}
      - POSTGRES_PASSWORD=${MAIN_DB_PASSWORD}
      - POSTGRES_DB=${MAIN_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIN_DB_USER} -d ${MAIN_DB_NAME}"]
      interval: 5s   # 5초마다 확인
      timeout: 5s    # 5초 안에 응답 없으면 실패로 간주
      retries: 5     # 5번 실패하면 unhealthy 처리

  redis:
    container_name: redis
    image: redis:7.2-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  main-db-data:
  redis-data:
