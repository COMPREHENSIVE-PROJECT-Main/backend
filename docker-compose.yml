services:
  main-backend:
    container_name: main-backend
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      main-db:
        condition: service_healthy  # DB가 실제로 쿼리 받을 준비가 됐을 때만 시작
      redis:
        condition: service_started
      # chromadb:
      #   condition: service_started
      ollama:
        condition: service_started
    restart: always
    cap_drop:
      - ALL
    environment:
      - DB_HOST=main-db
      - DB_PORT=5432
      - DB_USER=${MAIN_DB_USER}
      - DB_PASSWORD=${MAIN_DB_PASSWORD}
      - DB_NAME=${MAIN_DB_NAME}
      - REDIS_URL=redis://redis:6379
      # - CHROMA_HOST=chromadb
      # - CHROMA_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-gemma3:4b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}

  ai-service:
    container_name: ai-service
    build:
      context: .
      dockerfile: app/ai/Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_started
    restart: always
    cap_drop:
      - ALL
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-gemma3:4b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - LLM_MODE=test

  main-db:
    container_name: main-db
    image: postgres:16.2-alpine
    volumes:
      - main-db-data:/var/lib/postgresql/data
    restart: always
    environment:
      - POSTGRES_USER=${MAIN_DB_USER}
      - POSTGRES_PASSWORD=${MAIN_DB_PASSWORD}
      - POSTGRES_DB=${MAIN_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIN_DB_USER} -d ${MAIN_DB_NAME}"]
      interval: 5s   # 5초마다 확인
      timeout: 5s    # 5초 안에 응답 없으면 실패로 간주
      retries: 5     # 5번 실패하면 unhealthy 처리

  redis:
    container_name: redis
    image: redis:7.2-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # chromadb:
  #   container_name: chromadb
  #   image: chromadb/chroma:latest
  #   restart: always
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - chroma-data:/chroma/chroma
  #   environment:
  #     - IS_PERSISTENT=TRUE
  #     - ANONYMIZED_TELEMETRY=FALSE

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    container_name: ollama-init
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: >
      /bin/sh -c "
        sleep 10 &&
        ollama pull gemma3:4b &&
        ollama pull nomic-embed-text
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: on-failure

volumes:
  main-db-data:
  redis-data:
  # chroma-data:
  ollama-data:
